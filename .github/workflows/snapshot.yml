name: Deploy Snapshot to Sonatype

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  snapshot:
    name: Publish Snapshot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Configure Maven settings
        env:
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
        run: |
          mkdir -p ~/.m2
          if [ -z "$CENTRAL_PORTAL_USERNAME" ]; then
            echo "Error: CENTRAL_PORTAL_USERNAME is not set"
            exit 1
          fi
          echo "Using Central Portal token username: ${CENTRAL_PORTAL_USERNAME}"
          cat > ~/.m2/settings.xml << EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0
                                        https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>central-portal-snapshots</id>
                <username>${CENTRAL_PORTAL_USERNAME}</username>
                <password>${CENTRAL_PORTAL_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          EOF
          cat > ~/.m2/settings-security.xml << 'EOF'
          <settingsSecurity>
            <master></master>
          </settingsSecurity>
          EOF

      - name: Get project version
        id: project_version
        run: |
          version=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)
          echo "version=${version}" >> $GITHUB_OUTPUT

      - name: Build and deploy snapshot
        if: endsWith(steps.project_version.outputs.version, '-SNAPSHOT')
        run: |
          mvn -B clean deploy -DskipTests

      - name: Skip deploy (version is not -SNAPSHOT)
        if: ${{ !endsWith(steps.project_version.outputs.version, '-SNAPSHOT') }}
        run: |
          echo "Skip deploy: project.version=${{ steps.project_version.outputs.version }}"
